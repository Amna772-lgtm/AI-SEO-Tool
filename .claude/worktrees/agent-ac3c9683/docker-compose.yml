services:

  redis:
    image: redis:7
    container_name: ai_seo_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: ai_seo_backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - history_data:/app/data
    environment:
      REDIS_URL: redis://redis:6379/0
      GOOGLE_PSI_API_KEY: ${GOOGLE_PSI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}

  worker:
    build: ./backend
    container_name: ai_seo_worker
    command: celery -A app.worker.celery_app worker --beat --loglevel=info
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - history_data:/app/data
    environment:
      REDIS_URL: redis://redis:6379/0
      GOOGLE_PSI_API_KEY: ${GOOGLE_PSI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}

volumes:
  history_data:
