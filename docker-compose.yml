services:

  redis:
    image: redis:7
    container_name: ai_seo_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: ai_seo_backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "ai-seo-tool.local:host-gateway"
    volumes:
      - ./backend:/app
      - history_data:/app/data
    environment:
      REDIS_URL: redis://redis:6379/0
      GOOGLE_PSI_API_KEY: ${GOOGLE_PSI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      GEMINI_AI_API_KEY: ${GEMINI_AI_API_KEY:-}
      GROK_API_KEY: ${GROK_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_AGENCY: ${STRIPE_PRICE_AGENCY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

  worker:
    build: ./backend
    container_name: ai_seo_worker
    command: celery -A app.worker.celery_app worker --beat --loglevel=info
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "ai-seo-tool.local:host-gateway"
    volumes:
      - ./backend:/app
      - history_data:/app/data
    environment:
      REDIS_URL: redis://redis:6379/0
      GOOGLE_PSI_API_KEY: ${GOOGLE_PSI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      GEMINI_AI_API_KEY: ${GEMINI_AI_API_KEY:-}
      GROK_API_KEY: ${GROK_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}

volumes:
  history_data:
