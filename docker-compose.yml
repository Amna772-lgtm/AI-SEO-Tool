version: "3.9"

services:

  db:
    image: postgres:15
    container_name: ai_seo_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_seo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai_seo_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: ai_seo_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/ai_seo_db
      REDIS_URL: redis://redis:6379/0

  worker:
    build: ./backend
    container_name: ai_seo_worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/ai_seo_db
      REDIS_URL: redis://redis:6379/0

  pgadmin:
    image: dpage/pgadmin4
    container_name: ai_seo_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      - db

volumes:
  postgres_data: