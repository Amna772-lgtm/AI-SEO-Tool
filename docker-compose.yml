services:

  redis:
    image: redis:7
    container_name: ai_seo_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: ai_seo_backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    environment:
      REDIS_URL: redis://redis:6379/0
      GOOGLE_PSI_API_KEY: AIzaSyAjtBbgrt23Scx1zx1kal7GOQxq9iXTeHw

  worker:
    build: ./backend
    container_name: ai_seo_worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    environment:
      REDIS_URL: redis://redis:6379/0
      GOOGLE_PSI_API_KEY: AIzaSyAjtBbgrt23Scx1zx1kal7GOQxq9iXTeHw
